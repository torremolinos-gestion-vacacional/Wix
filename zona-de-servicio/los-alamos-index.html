<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Apartamentos Turísticos Los Álamos | Torremolinos</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        primary: '#F27D26',
                        dark: '#1A1A1A',
                    }
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        .selection-primary::selection { background-color: #F27D26; color: white; }
        .animate-spin-custom { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        body { overflow-x: hidden; width: 100%; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #F27D26; border-radius: 10px; }
    </style>
</head>
<body class="selection-primary bg-[#FDFCFB]">
    <div id="root"></div>

    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const NEIGHBORHOODS = [
            {
                id: 'los-alamos',
                name: 'Los Álamos',
                description: 'La zona más joven y dinámica de Torremolinos. Gestionamos tu alojamiento en Los Álamos con tecnología, cercanía y un enfoque en el público premium que busca playa y ocio de calidad.',
                heroImage: 'https://static.wixstatic.com/media/4e283a_9c71c1d6defc4caebe1084c230c19f44~mv2.jpg'
            }
        ];

        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const selectedNeighborhood = NEIGHBORHOODS[0];
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);

            const services = [
                { icon: "key", title: "Check-in Digital y Presencial", desc: "Adaptamos la entrada a un público joven y tecnológico, pero manteniendo el toque humano cuando es necesario." },
                { icon: "sparkles", title: "Limpieza Post-Evento", desc: "Especialistas en dejar tu apartamento impecable tras estancias cortas de fin de semana." },
                { icon: "clock", title: "Atención 24/7", desc: "Resolvemos dudas sobre los mejores beach clubs o transporte a Málaga a cualquier hora." },
                { icon: "wrench", title: "Mantenimiento Preventivo", desc: "Revisamos tu propiedad semanalmente para asegurar que todo funciona a la perfección." },
                { icon: "trending-up", title: "Revenue Management", desc: "Precios dinámicos que aprovechan los picos de demanda por conciertos y eventos en la playa." },
                { icon: "shield-check", title: "Control de Ruidos", desc: "Instalamos sensores de ruido discretos para garantizar la convivencia con los vecinos." },
                { icon: "camera", title: "Contenido para Redes", desc: "Fotos y vídeos optimizados para atraer al público que reserva a través de Instagram y TikTok." },
                { icon: "scale", title: "Gestión de Licencias", desc: "Nos encargamos de que tu vivienda cumpla al 100% con la normativa de la Junta." }
            ];

            const risks = [
                { title: "Fiestas No Autorizadas", desc: "Los Álamos atrae a un público joven. Sin un filtro estricto, tu apartamento puede convertirse en una discoteca improvisada.", icon: "alert-triangle" },
                { title: "Sanciones por Ruidos", desc: "Las denuncias vecinales en zonas residenciales modernas son rápidas y costosas. Nosotros monitorizamos el sonido.", icon: "shield-alert" },
                { title: "Desgaste del Mobiliario", desc: "La alta rotación y el uso intensivo requieren un mantenimiento constante que nosotros cubrimos.", icon: "wrench" },
                { title: "Check-ins a Deshoras", desc: "Los vuelos nocturnos son comunes. Nuestra gestión automatizada y presencial elimina este problema.", icon: "clock" },
                { title: "Competencia Feroz", desc: "Hay mucha oferta nueva en Los Álamos. Si no destacas en las plataformas, tu rentabilidad caerá en picado.", icon: "trending-down" },
                { title: "Inseguridad Jurídica", desc: "No registrar a los viajeros en Hospedería conlleva multas graves. Lo hacemos por ti al instante.", icon: "lock" }
            ];

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                const formData = new FormData(e.currentTarget);
                try {
                    const response = await fetch('https://formspree.io/f/mjgpgdgw', {
                        method: 'POST',
                        body: formData,
                        headers: { 'Accept': 'application/json' }
                    });
                    if (response.ok) setIsSubmitted(true);
                    else alert('Error al enviar. Inténtalo de nuevo.');
                } catch (error) {
                    alert('Error de conexión.');
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="min-h-screen bg-[#FDFCFB] text-[#1A1A1A] font-sans overflow-x-hidden">
                    {/* Header / Nav */}
                    <nav className="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between h-16 md:h-20 items-center">
                                <div className="flex items-center gap-2 md:gap-3">
                                    <div className="w-8 h-8 md:w-10 md:h-10 bg-primary rounded-lg flex items-center justify-center text-white font-bold text-lg md:text-xl">G</div>
                                    <div className="flex flex-col">
                                        <span className="text-sm md:text-lg font-bold tracking-tight leading-none">Gestión Apartamentos</span>
                                        <span className="text-[8px] md:text-[10px] uppercase tracking-[0.2em] text-gray-500 font-semibold">Los Álamos</span>
                                    </div>
                                </div>
                                <a href="#contacto" className="bg-dark text-white px-4 md:px-6 py-2 md:py-2.5 rounded-full text-xs md:text-sm font-semibold hover:bg-primary transition-all">
                                    Contactar
                                </a>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="relative pt-8 md:pt-16 pb-16 md:pb-24 overflow-hidden">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="grid lg:grid-cols-2 gap-8 md:gap-12 items-center">
                                <div className="order-2 lg:order-1">
                                    <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-orange-100 text-primary text-[10px] md:text-xs font-bold uppercase tracking-wider mb-4 md:mb-6">
                                        <Icon name="map-pin" className="w-3 h-3" /> SEO Local: Los Álamos, Torremolinos
                                    </div>
                                    <h1 className="text-3xl sm:text-5xl md:text-6xl font-bold leading-[1.1] tracking-tight mb-4 md:mb-6">
                                        Gestión de Apartamentos en <span className="text-primary">Los Álamos</span>
                                    </h1>
                                    <p className="text-lg md:text-xl text-gray-600 mb-6 md:mb-8 leading-relaxed">
                                        Maximizamos la rentabilidad de tu propiedad en la zona más exclusiva y demandada por el turismo joven y de calidad en Torremolinos. <strong>Especialistas en Los Álamos.</strong>
                                    </p>
                                    <div className="flex flex-wrap gap-3 md:gap-4">
                                        <div className="flex items-center gap-2 bg-white px-3 md:px-4 py-2 rounded-lg shadow-sm border border-gray-100">
                                            <Icon name="check-circle-2" className="w-4 h-4 md:w-5 md:h-5 text-green-500" />
                                            <span className="text-sm md:text-base font-semibold">15% Comisión</span>
                                        </div>
                                        <div className="flex items-center gap-2 bg-white px-3 md:px-4 py-2 rounded-lg shadow-sm border border-gray-100">
                                            <Icon name="check-circle-2" className="w-4 h-4 md:w-5 md:h-5 text-green-500" />
                                            <span className="text-sm md:text-base font-semibold">Sin Permanencia</span>
                                        </div>
                                        <div className="flex items-center gap-2 bg-white px-3 md:px-4 py-2 rounded-lg shadow-sm border border-gray-100">
                                            <Icon name="check-circle-2" className="w-4 h-4 md:w-5 md:h-5 text-green-500" />
                                            <span className="text-sm md:text-base font-semibold">Control de Ruidos</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="relative order-1 lg:order-2">
                                    <div className="aspect-[4/3] rounded-2xl md:rounded-3xl overflow-hidden shadow-2xl">
                                        <img src={selectedNeighborhood.heroImage} alt={selectedNeighborhood.name} className="w-full h-full object-cover" />
                                    </div>
                                    <div className="absolute -bottom-4 -left-4 md:-bottom-6 md:-left-6 bg-white p-4 md:p-6 rounded-xl md:rounded-2xl shadow-xl border border-gray-100 max-w-[180px] md:max-w-[240px]">
                                        <div className="flex items-center gap-2 md:gap-3 mb-1 md:mb-2">
                                            <div className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-orange-100 flex items-center justify-center">
                                                <Icon name="trending-up" className="text-primary w-4 h-4 md:w-5 md:h-5" />
                                            </div>
                                            <span className="text-xs md:text-sm font-bold">Ocupación +90%</span>
                                        </div>
                                        <p className="text-[10px] md:text-xs text-gray-500">Los Álamos es la zona con mayor crecimiento de demanda en toda la Costa del Sol.</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Authority Section */}
                    <section className="py-16 md:py-24 bg-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="grid lg:grid-cols-2 gap-12 md:gap-16 items-center">
                                <div className="bg-gray-50 p-8 md:p-12 rounded-2xl md:rounded-[3rem] border border-gray-100 order-2 lg:order-1">
                                    <h3 className="text-xl md:text-2xl font-bold mb-6">¿Por qué Los Álamos es diferente?</h3>
                                    <p className="text-gray-600 mb-6">
                                        A diferencia del centro o La Carihuela, Los Álamos atrae a un perfil que busca <strong>exclusividad, playa y ocio nocturno de nivel</strong>. Esto permite precios por noche más elevados, pero exige una gestión mucho más profesional.
                                    </p>
                                    <div className="space-y-4">
                                        <div className="flex items-center gap-3">
                                            <div className="w-2 h-2 bg-primary rounded-full"></div>
                                            <span className="text-sm md:text-base font-medium">Cercanía estratégica al Aeropuerto y Plaza Mayor.</span>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <div className="w-2 h-2 bg-primary rounded-full"></div>
                                            <span className="text-sm md:text-base font-medium">Público con mayor poder adquisitivo.</span>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <div className="w-2 h-2 bg-primary rounded-full"></div>
                                            <span className="text-sm md:text-base font-medium">Demanda alta de estancias cortas y eventos.</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="order-1 lg:order-2">
                                    <h2 className="text-3xl md:text-4xl font-bold mb-6 leading-tight">Expertos en el Micro-Mercado de <span className="text-primary">Los Álamos</span></h2>
                                    <p className="text-base md:text-lg text-gray-600 mb-8">
                                        Conocemos cada urbanización y cada bloque en Los Álamos. Sabemos qué fotos funcionan mejor para atraer al turista que busca los <strong>Beach Clubs</strong> y la modernidad de esta zona.
                                    </p>
                                    <a href="#contacto" className="inline-flex items-center gap-2 text-primary font-bold hover:gap-4 transition-all">
                                        Quiero una valoración de mi apartamento <Icon name="arrow-right" className="w-5 h-5" />
                                    </a>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Risks Section */}
                    <section className="py-16 md:py-24 bg-dark text-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-12 md:mb-16">
                                <h2 className="text-3xl md:text-5xl font-bold mb-6 italic font-serif">Protege tu Inversión en Los Álamos</h2>
                                <p className="text-gray-400 max-w-3xl mx-auto text-sm md:text-lg">
                                    La zona joven de Torremolinos tiene riesgos específicos. No dejes que una mala gestión arruine tu propiedad o te traiga problemas legales.
                                </p>
                            </div>
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                                {risks.map((risk, i) => (
                                    <div key={i} className="bg-white/5 p-6 md:p-8 rounded-2xl border border-white/10 hover:border-primary transition-all group">
                                        <Icon name={risk.icon} className="w-8 h-8 md:w-10 md:h-10 text-primary mb-4 md:mb-6 group-hover:scale-110 transition-transform" />
                                        <h3 className="text-lg md:text-xl font-bold mb-3 md:mb-4">{risk.title}</h3>
                                        <p className="text-gray-400 text-sm md:text-base leading-relaxed">{risk.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Services Grid */}
                    <section className="py-16 md:py-24 bg-gray-50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-12 md:mb-16">
                                <h2 className="text-3xl md:text-4xl font-bold mb-4">Servicios Diseñados para Los Álamos</h2>
                                <p className="text-gray-600 text-sm md:text-base">Gestión 360º para que tú solo te preocupes de recibir tus ingresos.</p>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                                {services.map((service, i) => (
                                    <div key={i} className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                                        <Icon name={service.icon} className="w-8 h-8 md:w-10 md:h-10 text-primary mb-4 md:mb-6" />
                                        <h4 className="text-base md:text-lg font-bold mb-2">{service.title}</h4>
                                        <p className="text-xs md:text-sm text-gray-500 leading-relaxed">{service.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Contact Form */}
                    <section id="contacto" className="py-16 md:py-24">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="bg-dark rounded-2xl md:rounded-[3rem] overflow-hidden text-white grid lg:grid-cols-2">
                                <div className="p-8 md:p-16 lg:p-20">
                                    <h2 className="text-2xl sm:text-3xl md:text-4xl font-bold mb-6 md:mb-8 leading-tight">
                                        ¿Hablamos sobre tu propiedad en <span className="text-primary">Los Álamos</span>?
                                    </h2>
                                    <div className="space-y-6">
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 md:w-12 md:h-12 rounded-full bg-white/10 flex items-center justify-center">
                                                <Icon name="phone" className="w-5 h-5 text-primary" />
                                            </div>
                                            <div><div className="text-xs md:text-sm text-gray-400">Llámanos</div><div className="text-lg md:text-xl font-bold">+34 615 834 991</div></div>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 md:w-12 md:h-12 rounded-full bg-white/10 flex items-center justify-center">
                                                <Icon name="mail" className="w-5 h-5 text-primary" />
                                            </div>
                                            <div><div className="text-xs md:text-sm text-gray-400">Email</div><div className="text-lg md:text-xl font-bold break-all">info@gestion-apartamentos-turisticos-torremolinos.com</div></div>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 md:w-12 md:h-12 rounded-full bg-white/10 flex items-center justify-center">
                                                <Icon name="map-pin" className="w-5 h-5 text-primary" />
                                            </div>
                                            <div><div className="text-xs md:text-sm text-gray-400">Oficina</div><div className="text-lg md:text-xl font-bold">Torremolinos</div></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-primary p-8 md:p-16 lg:p-20">
                                    {!isSubmitted ? (
                                        <form className="space-y-4" onSubmit={handleSubmit}>
                                            <input type="hidden" name="_subject" value="Interés Gestión Los Álamos" />
                                            <div>
                                                <label className="block text-[10px] md:text-xs font-bold mb-1 md:mb-2 uppercase tracking-widest text-white/80">Nombre Completo</label>
                                                <input required name="nombre" type="text" className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/60 text-sm md:text-base focus:bg-white/20 focus:outline-none transition-all" placeholder="Tu nombre..." />
                                            </div>
                                            <div>
                                                <label className="block text-[10px] md:text-xs font-bold mb-1 md:mb-2 uppercase tracking-widest text-white/80">Teléfono de Contacto</label>
                                                <input required name="telefono" type="tel" className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/60 text-sm md:text-base focus:bg-white/20 focus:outline-none transition-all" placeholder="Tu teléfono..." />
                                            </div>
                                            <div>
                                                <label className="block text-[10px] md:text-xs font-bold mb-1 md:mb-2 uppercase tracking-widest text-white/80">Mensaje</label>
                                                <textarea required name="mensaje" rows="3" className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/60 text-sm md:text-base focus:bg-white/20 focus:outline-none transition-all" placeholder="Cuéntanos sobre tu propiedad en Los Álamos..."></textarea>
                                            </div>
                                            <button disabled={isSubmitting} className="w-full bg-white text-primary py-4 rounded-xl font-bold text-base md:text-lg shadow-lg hover:shadow-xl hover:scale-[1.02] active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                                                {isSubmitting ? 'Enviando...' : 'Solicitar Información Gratis'}
                                            </button>
                                        </form>
                                    ) : (
                                        <div className="text-center py-8 md:py-12">
                                            <div className="w-16 h-16 md:w-20 md:h-20 bg-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl">
                                                <Icon name="check-circle-2" className="w-8 h-8 md:w-10 md:h-10 text-primary" />
                                            </div>
                                            <h3 className="text-2xl md:text-3xl font-bold mb-4">¡Mensaje Enviado!</h3>
                                            <p className="text-sm md:text-base text-white/90">Gracias por confiar en nosotros. Te contactaremos en menos de 24 horas para darte una valoración gratuita de tu propiedad en Los Álamos.</p>
                                            <button onClick={() => setIsSubmitted(false)} className="mt-8 text-white underline text-sm font-semibold">Enviar otro mensaje</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </section>
                    
                    {/* Footer */}
                    <footer className="py-12 border-t border-gray-100 bg-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
