<body class="selection-primary bg-[#FDFCFB]">

            ];

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                const formData = new FormData(e.currentTarget);
                try {
                    const response = await fetch('https://formspree.io/f/mjgpgdgw', {
                        method: 'POST',
                        body: formData,
                        headers: { 'Accept': 'application/json' }
                    });
                    if (response.ok) setIsSubmitted(true);
                    else alert('Error al enviar. Inténtalo de nuevo.');
                } catch (error) {
                    alert('Error de conexión.');
                } finally {
                    setIsSubmitting(false);
                }

                                    <p className="text-lg md:text-xl text-gray-600 mb-6 md:mb-8 leading-relaxed">

                                            <Icon name="check-circle-2" className="w-4 h-4 md:w-5 md:h-5 text-green-500" />
                                            <span className="text-sm md:text-base font-semibold">15% Comisión</span>
                                        </div>
                                        <div className="flex items-center gap-2 bg-white px-3 md:px-4 py-2 rounded-lg shadow-sm border border-gray-100">
                                            <Icon name="check-circle-2" className="w-4 h-4 md:w-5 md:h-5 text-green-500" />
                                            <span className="text-sm md:text-base font-semibold">Sin Permanencia</span>
                                        </div>

                                            <Icon name="check-circle-2" className="w-4 h-4 md:w-5 md:h-5 text-green-500" />

                                <div className="bg-gray-50 p-8 md:p-10 rounded-2xl md:rounded-[3rem] border border-gray-100">

                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">

                                    </h2>
                                    <div className="space-y-6">
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 md:w-12 md:h-12 rounded-full bg-white/10 flex items-center justify-center">
                                                <Icon name="phone" className="w-5 h-5 text-primary" />
                                            </div>
                                            <div><div className="text-xs md:text-sm text-gray-400">Llámanos</div><div className="text-lg md:text-xl font-bold">+34 615 834 991</div></div>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 md:w-12 md:h-12 rounded-full bg-white/10 flex items-center justify-center">
                                                <Icon name="mail" className="w-5 h-5 text-primary" />
                                            </div>
                                            <div><div className="text-xs md:text-sm text-gray-400">Email</div><div className="text-lg md:text-xl font-bold break-all">apartamento.booking@gmail.com</div></div>

                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 md:w-12 md:h-12 rounded-full bg-white/10 flex items-center justify-center">

                                            </div>
                                            <div><div className="text-xs md:text-sm text-gray-400">Oficina</div><div className="text-lg md:text-xl font-bold">Torremolinos</div></div>

                                            </div>

                                                <Icon name="check-circle-2" className="w-8 h-8 md:w-10 md:h-10 text-primary" />
                                            </div>
                                            <h3 className="text-2xl md:text-3xl font-bold mb-4">¡Mensaje Enviado!</h3>
                                            <p className="text-sm md:text-base text-white/90">Gracias por confiar en nosotros. Te contactaremos en menos de 24 horas para darte una valoración gratuita.</p>
                                            <button onClick={() => setIsSubmitted(false)} className="mt-8 text-white underline text-sm font-semibold">Enviar otro mensaje</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </section>
                    
                    {/* Footer */}
                    <footer className="py-12 border-t border-gray-100 bg-white">

                            </p>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
