<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Apartamentos Torremolinos - Wix Embed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { primary: '#F27D26', dark: '#1A1A1A' }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        .selection-primary::selection { background-color: #F27D26; color: white; }
    </style>
</head>
<body class="selection-primary">
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const NEIGHBORHOODS = [
            { id: 'la-carihuela', name: 'La Carihuela', description: 'Especialistas en la gestión de apartamentos en el antiguo barrio de pescadores. Maximizamos tus ingresos en la zona con más solera de Torremolinos.', heroImage: 'https://static.wixstatic.com/media/4e283a_92deb87a6212489bbd7570fcbdd5545f~mv2.jpg' },
            { id: 'el-bajondillo', name: 'El Bajondillo', description: 'Gestión integral en el corazón marítimo de Torremolinos. Tu propiedad en El Bajondillo en las mejores manos.', heroImage: 'https://static.wixstatic.com/media/4e283a_92deb87a6212489bbd7570fcbdd5545f~mv2.jpg' },
            { id: 'playamar', name: 'Playamar', description: 'Expertos en rentabilidad vacacional en las exclusivas torres y urbanizaciones de Playamar.', heroImage: 'https://static.wixstatic.com/media/4e283a_92deb87a6212489bbd7570fcbdd5545f~mv2.jpg' },
            { id: 'los-alamos', name: 'Los Álamos', description: 'La zona más joven y dinámica de Torremolinos. Gestionamos tu alojamiento en Los Álamos con tecnología y cercanía.', heroImage: 'https://static.wixstatic.com/media/4e283a_92deb87a6212489bbd7570fcbdd5545f~mv2.jpg' },
            { id: 'montemar', name: 'Montemar', description: 'Gestión de villas y apartamentos de lujo en la zona residencial de Montemar. Exclusividad y resultados.', heroImage: 'https://static.wixstatic.com/media/4e283a_92deb87a6212489bbd7570fcbdd5545f~mv2.jpg' },
            { id: 'el-calvario', name: 'El Calvario', description: 'El encanto del Torremolinos tradicional. Gestionamos tu vivienda en El Calvario para que no te preocupes por nada.', heroImage: 'https://static.wixstatic.com/media/4e283a_92deb87a6212489bbd7570fcbdd5545f~mv2.jpg' },
            { id: 'centro', name: 'Centro de Torremolinos', description: 'Ubicación estratégica, gestión impecable. Sacamos el máximo partido a tu propiedad en el centro de la ciudad.', heroImage: 'https://static.wixstatic.com/media/4e283a_92deb87a6212489bbd7570fcbdd5545f~mv2.jpg' },
            { id: 'el-pinillo', name: 'El Pinillo', description: 'Zona residencial con gran potencial. Gestionamos tu apartamento en El Pinillo con total transparencia.', heroImage: 'https://static.wixstatic.com/media/4e283a_92deb87a6212489bbd7570fcbdd5545f~mv2.jpg' }
        ];
        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} className={className}></i>;
        };
        function App() {
            const [selectedNeighborhood, setSelectedNeighborhood] = useState(NEIGHBORHOODS[0]);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                const formData = new FormData(e.currentTarget);
                try {
                    const response = await fetch('https://formspree.io/f/mjgpgdgw', {
                        method: 'POST',
                        body: formData,
                        headers: { 'Accept': 'application/json' }
                    });
                    if (response.ok) setIsSubmitted(true);
                    else alert('Error al enviar. Inténtalo de nuevo.');
                } catch (error) { alert('Error de conexión.'); } finally { setIsSubmitting(false); }
            };
            return (
                <div className="min-h-screen bg-[#FDFCFB] text-[#1A1A1A] font-sans">
                    <section className="relative pt-8 md:pt-12 pb-16 md:pb-24 overflow-hidden">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="grid lg:grid-cols-2 gap-8 md:gap-12 items-center">
                                <div>
                                    <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-orange-100 text-primary text-[10px] md:text-xs font-bold uppercase tracking-wider mb-4 md:mb-6">
                                        <Icon name="map-pin" className="w-3 h-3" /> SEO Local: {selectedNeighborhood.name}
                                    </div>
                                    <h1 className="text-3xl sm:text-5xl md:text-6xl font-bold leading-[1.1] tracking-tight mb-4 md:mb-6">
                                        Gestión de Apartamentos Turísticos en <span className="text-primary">{selectedNeighborhood.name}</span>
                                    </h1>
                                    <p className="text-lg md:text-xl text-gray-600 mb-6 md:mb-8 leading-relaxed">
                                        {selectedNeighborhood.description} Deja de sufrir con la gestión diaria y empieza a disfrutar de tu rentabilidad real.
                                    </p>
                                    <div className="flex flex-wrap gap-3 md:gap-4">
                                        <div className="flex items-center gap-2 bg-white px-3 md:px-4 py-2 rounded-lg shadow-sm border border-gray-100">
                                            <Icon name="check-circle-2" className="w-4 h-4 md:w-5 md:h-5 text-green-500" />
                                            <span className="text-sm md:text-base font-semibold">15% Comisión</span>
                                        </div>
                                        <div className="flex items-center gap-2 bg-white px-3 md:px-4 py-2 rounded-lg shadow-sm border border-gray-100">
                                            <Icon name="check-circle-2" className="w-4 h-4 md:w-5 md:h-5 text-green-500" />
                                            <span className="text-sm md:text-base font-semibold">Sin Permanencia</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="relative mt-8 lg:mt-0">
                                    <div className="aspect-[4/3] rounded-2xl md:rounded-3xl overflow-hidden shadow-2xl">
                                        <img src={selectedNeighborhood.heroImage} alt={selectedNeighborhood.name} className="w-full h-full object-cover" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                    <section className="py-16 md:py-24 bg-dark text-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-12 md:mb-16">
                                <h2 className="text-2xl md:text-4xl font-bold mb-4 italic font-serif">¿Gestionas tu alojamiento tú mismo?</h2>
                                <p className="text-gray-400 text-sm md:text-base">La gestión vacacional en Torremolinos no es un hobby, es un trabajo de 24 horas.</p>
                            </div>
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                                <div className="bg-white/5 p-6 md:p-8 rounded-2xl border border-white/10">
                                    <Icon name="alert-triangle" className="w-6 h-6 md:w-8 md:h-8 text-primary mb-4" />
                                    <p className="text-base md:text-lg font-medium">¿Cansado de responder mensajes a las 3 de la mañana?</p>
                                </div>
                                <div className="bg-white/5 p-6 md:p-8 rounded-2xl border border-white/10">
                                    <Icon name="alert-triangle" className="w-6 h-6 md:w-8 md:h-8 text-primary mb-4" />
                                    <p className="text-base md:text-lg font-medium">¿Problemas con limpiezas que no cumplen?</p>
                                </div>
                                <div className="bg-primary p-6 md:p-8 rounded-2xl text-center flex flex-col justify-center">
                                    <h3 className="text-xl md:text-2xl font-bold mb-4">Tenemos la solución</h3>
                                    <a href="#contacto" className="bg-white text-dark px-6 md:px-8 py-3 rounded-full font-bold inline-block text-sm md:text-base">Contactar</a>
                                </div>
                            </div>
                        </div>
                    </section>
                    <section id="contacto" className="py-16 md:py-24">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="bg-dark rounded-2xl md:rounded-[3rem] overflow-hidden text-white grid lg:grid-cols-2">
                                <div className="p-8 md:p-20">
                                    <h2 className="text-2xl sm:text-3xl md:text-4xl font-bold mb-6 md:mb-8 leading-tight">
                                        ¿Hablamos sobre tu propiedad en <span className="text-primary">{selectedNeighborhood.name}</span>?
                                    </h2>
                                    <div className="space-y-6">
                                        <div className="flex items-center gap-4">
                                            <Icon name="phone" className="w-5 h-5 text-primary" />
                                            <div><div className="text-xs md:text-sm text-gray-400">Llámanos</div><div className="text-lg md:text-xl font-bold">+34 615 834 991</div></div>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <Icon name="mail" className="w-5 h-5 text-primary" />
                                            <div><div className="text-xs md:text-sm text-gray-400">Email</div><div className="text-lg md:text-xl font-bold break-all">apartamento.booking@gmail.com</div></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-primary p-8 md:p-20">
                                    {!isSubmitted ? (
                                        <form className="space-y-4" onSubmit={handleSubmit}>
                                            <input required name="nombre" type="text" className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/60 text-sm md:text-base" placeholder="Nombre..." />
                                            <input required name="telefono" type="tel" className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/60 text-sm md:text-base" placeholder="Teléfono..." />
                                            <select required name="barrio" className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white text-sm md:text-base">
                                                {NEIGHBORHOODS.map(n => <option key={n.id} value={n.name} className="text-black">{n.name}</option>)}
                                            </select>
                                            <textarea required name="mensaje" rows="4" className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/60 text-sm md:text-base" placeholder="Mensaje..."></textarea>
                                            <button disabled={isSubmitting} className="w-full bg-white text-primary py-4 rounded-xl font-bold text-base md:text-lg disabled:opacity-50">
                                                {isSubmitting ? 'Enviando...' : 'Enviar Información'}
                                            </button>
                                        </form>
                                    ) : (
                                        <div className="text-center py-8 md:py-12">
                                            <Icon name="check-circle-2" className="w-12 h-12 md:w-16 md:h-16 mx-auto mb-6" />
                                            <h3 className="text-2xl md:text-3xl font-bold mb-4">¡Enviado!</h3>
                                            <p className="text-sm md:text-base">Te contactaremos en menos de 24 horas.</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
